<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Carrito</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1>Carrito de Compras</h1>

<div id="lista"></div>

<h2 id="total"></h2>

<a class="btn" id="comprar">
Finalizar compra por WhatsApp
</a>

<script>

let carrito=JSON.parse(localStorage.getItem("carrito"))||[];

let lista=document.getElementById("lista");

let total=0;

let mensaje="Hola, deseo comprar:%0A";

carrito.forEach(p=>{

lista.innerHTML+=`<p>${p.nombre} - $${p.precio}</p>`;

total+=p.precio;

mensaje+=`${p.nombre} - $${p.precio}%0A`;

});

document.getElementById("total").innerHTML="Total: $"+total;

mensaje+="Total: $"+total;

document.getElementById("comprar").href="https://wa.me/593991582124?text="+mensaje;

</script>

</body>

</html>
